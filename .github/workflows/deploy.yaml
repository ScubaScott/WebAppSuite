name: Deploy Website to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v6 # Upgraded to v6 for Node 24 support

    - name: 🚀 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0 # Upgraded to v4.4.0 for Node 24 support
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./                  
        server-dir: ./htdocs/