<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean Bag Scorekeeper</title>
    <style>
        :root {
            --red-team: #ef4444;
            --blue-team: #3b82f6;
            --board-wood: #875a36;
            --board-wood-light: #a67246;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 5px;
        }

        /* Settings Style */
        .settings-panel {
            margin-bottom: 15px;
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            border: 1px solid #334155;
        }

        .settings-panel input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Scoreboard Styling */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .team-box {
            text-align: center;
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-box.clickable {
            cursor: pointer;
        }
        .team-box.clickable:hover {
            background: #334155;
        }

        .team-box.red { border-left: 6px solid var(--red-team); }
        .team-box.blue { border-right: 6px solid var(--blue-team); }

        .team-box.active {
            box-shadow: inset 0 0 0 2px #ffffff30;
            transform: scale(1.02);
        }
        .team-box.red.active { background: rgba(239, 68, 68, 0.25); }
        .team-box.blue.active { background: rgba(59, 130, 246, 0.25); }

        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .red .team-name { color: var(--red-team); }
        .blue .team-name { color: var(--blue-team); }

        .total-score {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .round-pending {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
            font-weight: bold;
        }

        /* Bag Tally Lists */
        .tally-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 90%;
        }

        .tally-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-remove {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            margin-left: 8px;
            padding: 0 4px;
            user-select: none;
        }
        .btn-remove:hover {
            color: #f87171;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 2px;
        }

        .turn-indicator {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            background: #334155;
            margin-bottom: 15px;
            width: fit-content;
        }
        .turn-indicator.red-turn { color: var(--red-team); background: rgba(239, 68, 68, 0.1); }
        .turn-indicator.blue-turn { color: var(--blue-team); background: rgba(59, 130, 246, 0.1); }

        /* THE CORNHOLE BOARD (+1 Target) */
        .cornhole-board {
            width: 100%;
            max-width: 320px;
            height: 440px;
            
            background: linear-gradient(135deg, var(--board-wood) 25%, transparent 25%) -50px 0,
                        linear-gradient(225deg, var(--board-wood) 25%, transparent 25%) -50px 0,
                        linear-gradient(45deg, transparent 75%, var(--board-wood) 75%),
                        linear-gradient(315deg, transparent 75%, var(--board-wood) 75%);
            background-size: 4px 4px;
            background-color: var(--board-wood-light);
            
            border: 14px solid #5c3a21;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(0,0,0,0.4);
            
            margin-bottom: 25px;
            position: relative;
            cursor: pointer;
            user-select: none;
            box-sizing: border-box;
            
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cornhole-board::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 49%, rgba(0,0,0,0.08) 50%, transparent 51%);
            background-size: 40px 100%;
            pointer-events: none;
            z-index: 1;
        }

        .board-text-label {
            position: absolute;
            bottom: 40px;
            font-size: 1.4rem;
            font-weight: 900;
            color: #45260d;
            text-shadow: 0 1px 1px rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 2;
        }

        /* THE HOLE (+3 Target) */
        .circle-target {
            width: 120px;
            height: 120px;
            background-color: #111827;
            border: 8px solid #f97316;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: 800;
            color: #f97316;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.9), 0 4px 6px rgba(0,0,0,0.3);
            
            margin-top: 45px;
            
            display: flex;
            align-items: center;
            justify-content: center;
            
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .circle-target:active {
            transform: scale(0.93);
        }

        .cornhole-board:active:not(:has(.circle-target:active)) {
            transform: scale(0.98);
            box-shadow: 0 10px 15px -5px rgba(0, 0, 0, 0.5);
        }

        /* Controls styling */
        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-end {
            background-color: #10b981;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-end:hover { background-color: #059669; }

        .btn-reset {
            background-color: #475569;
            color: #cbd5e1;
        }
        .btn-reset:hover { background-color: #334155; }
    </style>
</head>
<body>

    <h1>Cornhole Keeper</h1>
    <p style="color: #64748b; margin-top: 0; margin-bottom: 15px;">Subtractive Scoring Mode</p>

    <div class="settings-panel">
        <input type="checkbox" id="alternate-mode-checkbox" onchange="toggleMode()">
        <label for="alternate-mode-checkbox">Score by whole team series (Tap team header to swap turns)</label>
    </div>

    <div class="scoreboard">
        <div id="red-box" class="team-box red active" onclick="teamHeaderClick('red', event)">
            <div class="team-name">TEAM RED</div>
            <div id="red-total" class="total-score">0</div>
            <div id="red-round" class="round-pending">Round: +0</div>
            <div id="red-tally" class="tally-list"></div>
        </div>
        <div id="blue-box" class="team-box blue" onclick="teamHeaderClick('blue', event)">
            <div class="team-name">TEAM BLUE</div>
            <div id="blue-total" class="total-score">0</div>
            <div id="blue-round" class="round-pending">Round: +0</div>
            <div id="blue-tally" class="tally-list"></div>
        </div>
    </div>

    <div id="turn-banner" class="turn-indicator red-turn">Red Team's Throw</div>

    <div class="cornhole-board" id="board-element" onclick="registerScore(1, 'Board', event)">
        <div class="circle-target" onclick="registerScore(3, 'Hole', event)">
            HOLE (+3)
        </div>
        <div class="board-text-label">BOARD (+1)</div>
    </div>

    <div class="btn-group">
        <button class="btn-reset" onclick="resetGame()">Reset Game</button>
        <button class="btn-end" onclick="endRound()">End Round</button>
    </div>

    <script>
        // Game State Object
        let gameState = {
            redTotal: 0,
            blueTotal: 0,
            redBags: [],   // Array of objects: { type: 'Board'|'Hole', points: 1|3 }
            blueBags: [],  // Array of objects
            currentTurn: 'red',
            seriesMode: false
        };

        // Load data from LocalStorage
        function loadGame() {
            const savedState = localStorage.getItem('beanBagScoreState');
            if (savedState) {
                gameState = JSON.parse(savedState);
                // Ensure array layers exist for backward compatibility
                if (!gameState.redBags) gameState.redBags = [];
                if (!gameState.blueBags) gameState.blueBags = [];
            }
            document.getElementById('alternate-mode-checkbox').checked = gameState.seriesMode;
            updateUI();
        }

        function saveGame() {
            localStorage.setItem('beanBagScoreState', JSON.stringify(gameState));
        }

        function toggleMode() {
            gameState.seriesMode = document.getElementById('alternate-mode-checkbox').checked;
            saveGame();
            updateUI();
        }

        // Handle target taps
        function registerScore(points, label, event) {
            if (event) event.stopPropagation();

            const bagEntry = { points: points, label: label };

            if (gameState.currentTurn === 'red') {
                gameState.redBags.push(bagEntry);
                if (!gameState.seriesMode) {
                    gameState.currentTurn = 'blue';
                }
            } else {
                gameState.blueBags.push(bagEntry);
                if (!gameState.seriesMode) {
                    gameState.currentTurn = 'red';
                }
            }
            saveGame();
            updateUI();
        }

        // Remove accidental point log entry
        function removeBag(team, index, event) {
            if (event) event.stopPropagation(); // Avoid triggering header turn swaps

            if (team === 'red') {
                gameState.redBags.splice(index, 1);
            } else {
                gameState.blueBags.splice(index, 1);
            }
            saveGame();
            updateUI();
        }

        function teamHeaderClick(team, event) {
            if (gameState.seriesMode) {
                gameState.currentTurn = team;
                saveGame();
                updateUI();
            }
        }

        // End round, calculate subtractive score from arrays, and reset round bags
        function endRound() {
            // Sum up arrays
            const redRoundTotal = gameState.redBags.reduce((sum, bag) => sum + bag.points, 0);
            const blueRoundTotal = gameState.blueBags.reduce((sum, bag) => sum + bag.points, 0);

            if (redRoundTotal > blueRoundTotal) {
                gameState.redTotal += (redRoundTotal - blueRoundTotal);
            } else if (blueRoundTotal > redRoundTotal) {
                gameState.blueTotal += (blueRoundTotal - redRoundTotal);
            }

            // Clear arrays for next round
            gameState.redBags = [];
            gameState.blueBags = [];
            
            if (redRoundTotal > blueRoundTotal) gameState.currentTurn = 'red';
            else if (blueRoundTotal > redRoundTotal) gameState.currentTurn = 'blue';

            saveGame();
            updateUI();
        }

        function resetGame() {
            if (confirm("Are you sure you want to reset the entire game?")) {
                gameState = {
                    redTotal: 0,
                    blueTotal: 0,
                    redBags: [],
                    blueBags: [],
                    currentTurn: 'red',
                    seriesMode: document.getElementById('alternate-mode-checkbox').checked
                };
                saveGame();
                updateUI();
            }
        }

        // Refresh the HTML visual display
        function updateUI() {
            // Calculate current round dynamic sums
            const redRoundSum = gameState.redBags.reduce((sum, bag) => sum + bag.points, 0);
            const blueRoundSum = gameState.blueBags.reduce((sum, bag) => sum + bag.points, 0);

            document.getElementById('red-total').innerText = gameState.redTotal;
            document.getElementById('blue-total').innerText = gameState.blueTotal;

            document.getElementById('red-round').innerText = `Round: +${redRoundSum}`;
            document.getElementById('blue-round').innerText = `Round: +${blueRoundSum}`;

            // Render Tally Lists
            const redTallyContainer = document.getElementById('red-tally');
            redTallyContainer.innerHTML = '';
            gameState.redBags.forEach((bag, index) => {
                redTallyContainer.innerHTML += `
                    <div class="tally-item">
                        <span>${bag.label} (+${bag.points})</span>
                        <span class="btn-remove" onclick="removeBag('red', ${index}, event)">✕</span>
                    </div>`;
            });

            const blueTallyContainer = document.getElementById('blue-tally');
            blueTallyContainer.innerHTML = '';
            gameState.blueBags.forEach((bag, index) => {
                blueTallyContainer.innerHTML += `
                    <div class="tally-item">
                        <span>${bag.label} (+${bag.points})</span>
                        <span class="btn-remove" onclick="removeBag('blue', ${index}, event)">✕</span>
                    </div>`;
            });

            const redBox = document.getElementById('red-box');
            const blueBox = document.getElementById('blue-box');
            const turnBanner = document.getElementById('turn-banner');

            if (gameState.seriesMode) {
                redBox.classList.add('clickable');
                blueBox.classList.add('clickable');
            } else {
                redBox.classList.remove('clickable');
                blueBox.classList.remove('clickable');
            }

            if (gameState.currentTurn === 'red') {
                redBox.classList.add('active');
                blueBox.classList.remove('active');
                turnBanner.innerText = gameState.seriesMode ? "Red Team's Turn (Batch)" : "Red Team's Throw";
                turnBanner.className = "turn-indicator red-turn";
            } else {
                blueBox.classList.add('active');
                redBox.classList.remove('active');
                turnBanner.innerText = gameState.seriesMode ? "Blue Team's Turn (Batch)" : "Blue Team's Throw";
                turnBanner.className = "turn-indicator blue-turn";
            }
        }

        loadGame();
    </script>
</body>
</html>
