<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Harley VIN Decoder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff6600" />

  <style>
    :root {
      --harley-orange: #ff6600;
      --harley-black: #111;
      --harley-gray: #222;
      --harley-white: #f5f5f5;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--harley-black);
      color: var(--harley-white);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      padding: 1.5rem;
      background: var(--harley-gray);
      border: 2px solid var(--harley-orange);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    h1 {
      text-align: center;
      color: var(--harley-orange);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.6rem;
      background: #000;
      color: var(--harley-white);
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 1rem;
    }

    .btn-row {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    button {
      padding: 0.6rem;
      border-radius: 4px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--harley-orange);
      color: var(--harley-black);
    }

    .btn-secondary {
      background: #333;
      color: var(--harley-white);
      border: 1px solid #555;
    }

    .status {
      margin-top: 1rem;
      min-height: 1.2rem;
      font-size: 0.85rem;
      color: #bbb;
    }

    .image-preview {
      margin-top: 1rem;
      text-align: center;
    }

    .image-preview img {
      max-width: 100%;
      border: 1px solid #444;
      border-radius: 4px;
    }

    .decode-result {
      margin-top: 1rem;
      background: #000;
      padding: 0.6rem;
      border-radius: 4px;
      border: 1px solid #444;
      color: var(--harley-orange);
      font-weight: 600;
      display: none;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Harley VIN Decoder</h1>

    <label for="vinInput">VIN</label>
    <input id="vinInput" type="text" maxlength="40" placeholder="Type, paste, or scan VIN">

    <div class="btn-row">
      <button class="btn-primary" id="cameraCaptureBtn">📷 Scan VIN with Camera</button>
      <button class="btn-secondary" id="galleryBtn">🖼 Use Photo from Camera Roll</button>
      <button class="btn-primary" id="decodeBtn">Decode</button>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="galleryInput" accept="image/*" style="display:none">

    <div class="status" id="status"></div>

    <div class="image-preview" id="imagePreview" style="display:none">
      <img id="previewImg" alt="VIN image preview">
    </div>

    <div class="decode-result" id="decodeResult"></div>
  </div>

  <!-- Tesseract.js -->
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <script>
    // PWA service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    const vinInput = document.getElementById("vinInput");
    const statusEl = document.getElementById("status");
    const decodeResult = document.getElementById("decodeResult");

    const cameraCaptureBtn = document.getElementById("cameraCaptureBtn");
    const galleryBtn = document.getElementById("galleryBtn");
    const cameraInput = document.getElementById("cameraInput");
    const galleryInput = document.getElementById("galleryInput");

    cameraCaptureBtn.addEventListener("click", () => cameraInput.click());
    galleryBtn.addEventListener("click", () => galleryInput.click());

    cameraInput.addEventListener("change", handleImage);
    galleryInput.addEventListener("change", handleImage);

    function handleImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById("previewImg").src = e.target.result;
        document.getElementById("imagePreview").style.display = "block";
        runOcr(e.target.result);
      };
      reader.readAsDataURL(file);
    }

    function runOcr(imageDataUrl) {
      statusEl.textContent = "Running OCR...";

      Tesseract.recognize(imageDataUrl, "eng", {
        logger: m => {
          if (m.status === "recognizing text") {
            statusEl.textContent = `OCR: ${Math.round(m.progress * 100)}%`;
          }
        }
      }).then(result => {
        statusEl.textContent = "OCR complete.";
        const rawText = result.data.text || "";
        vinInput.value = rawText.trim();   // *** RAW TEXT ONLY ***
      }).catch(err => {
        statusEl.textContent = "OCR error.";
        console.error(err);
      });
    }

    // -------------------------------
    // Decode button: FIRST STEP ONLY
    // -------------------------------
    document.getElementById("decodeBtn").addEventListener("click", () => {
      const text = vinInput.value.toUpperCase().replace(/\s+/g, "");
      decodeResult.style.display = "block";

      // Harley 1981+ VIN pattern (17 chars, no I/O/Q)
      const harley1981Regex = /^[A-HJ-NPR-Z0-9]{17}$/;

      if (harley1981Regex.test(text)) {
        decodeResult.textContent = "Matched Harley-Davidson 1981–Present 17-digit VIN format.";
      } else {
        decodeResult.textContent = "VIN does not match Harley 1981–Present format.";
      }
    });
  </script>
</body>
</html>
