<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Harley VIN Decoder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --harley-orange: #ff6600;
            --harley-black: #111;
            --harley-gray: #222;
            --harley-white: #f5f5f5;
        }

        body {
            margin: 0;
            background: var(--harley-black);
            color: var(--harley-white);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        .app {
            width: 100%;
            max-width: 520px;
            background: var(--harley-gray);
            border: 2px solid var(--harley-orange);
            border-radius: 8px;
            padding: 1rem;
        }

        h1 {
            text-align: center;
            color: var(--harley-orange);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.6rem;
            background: #000;
            color: var(--harley-white);
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            padding: 0.6rem;
            border-radius: 4px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 0.4rem;
        }

        .btn-primary {
            background: var(--harley-orange);
            color: var(--harley-black);
        }

        .btn-secondary {
            background: #333;
            color: var(--harley-white);
            border: 1px solid #555;
        }

        #vinCanvas {
            width: 100%;
            margin-top: 1rem;
            border: 1px solid #555;
            background: #000;
        }

        #ocrList button {
            width: 100%;
            text-align: left;
        }

        .status {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #bbb;
        }

        .decode-result {
            margin-top: 1rem;
            background: #000;
            padding: 0.6rem;
            border-radius: 4px;
            border: 1px solid #444;
            color: var(--harley-orange);
            font-weight: 600;
            display: none;
        }
    </style>
</head>

<body>
    <div class="app">

        <h1>Harley VIN Decoder</h1>

        <label for="vinInput">VIN</label>
        <input id="vinInput" type="text" maxlength="40" placeholder="Type, paste, or select OCR result">

        <button id="cameraBtn" class="btn-primary">📷 Scan VIN with Camera</button>
        <button id="galleryBtn" class="btn-secondary">🖼 Use Photo from Gallery</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="galleryInput" accept="image/*" style="display:none">

        <div style="margin-top:1rem;">
            <button id="rotateLeftBtn" class="btn-secondary">⟲ Rotate Left</button>
            <button id="rotateRightBtn" class="btn-secondary">⟳ Rotate Right</button>
            <button id="cropToggleBtn" class="btn-secondary">✂ Crop Mode</button>
        </div>

        <canvas id="vinCanvas" width="400" height="300"></canvas>

        <button id="processImageBtn" class="btn-primary">Process Image</button>

        <div class="status" id="status"></div>

        <div id="ocrList" style="margin-top:1rem;"></div>

        <button id="decodeBtn" class="btn-primary">Decode</button>

        <div id="decodeResult" class="decode-result"></div>

    </div>

    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

    <script>
        const vinInput = document.getElementById("vinInput");
        const statusEl = document.getElementById("status");
        const decodeResult = document.getElementById("decodeResult");

        const cameraBtn = document.getElementById("cameraBtn");
        const galleryBtn = document.getElementById("galleryBtn");
        const cameraInput = document.getElementById("cameraInput");
        const galleryInput = document.getElementById("galleryInput");

        const canvas = document.getElementById("vinCanvas");
        const ctx = canvas.getContext("2d");

        let loadedImage = null;
        let rotation = 0;
        let cropMode = false;
        let cropStart = null;
        let cropEnd = null;

        cameraBtn.onclick = () => cameraInput.click();
        galleryBtn.onclick = () => galleryInput.click();

        cameraInput.onchange = handleImageFile;
        galleryInput.onchange = handleImageFile;

        function handleImageFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                loadedImage = new Image();
                loadedImage.onload = () => {
                    rotation = 0;
                    drawImage();
                };
                loadedImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawImage() {
            if (!loadedImage) return;

            const w = loadedImage.width;
            const h = loadedImage.height;

            if (rotation % 180 !== 0) {
                canvas.width = h;
                canvas.height = w;
            } else {
                canvas.width = w;
                canvas.height = h;
            }

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.drawImage(loadedImage, -w / 2, -h / 2);

            ctx.restore();

            if (cropMode && cropStart && cropEnd) {
                ctx.strokeStyle = "red";
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    cropStart.x,
                    cropStart.y,
                    cropEnd.x - cropStart.x,
                    cropEnd.y - cropStart.y
                );
            }
        }

        document.getElementById("rotateLeftBtn").onclick = () => {
            rotation = (rotation - 90) % 360;
            drawImage();
        };

        document.getElementById("rotateRightBtn").onclick = () => {
            rotation = (rotation + 90) % 360;
            drawImage();
        };

        document.getElementById("cropToggleBtn").onclick = () => {
            cropMode = !cropMode;
            cropStart = null;
            cropEnd = null;
            drawImage();
        };

        canvas.onmousedown = e => {
            if (!cropMode) return;
            cropStart = { x: e.offsetX, y: e.offsetY };
            cropEnd = { x: e.offsetX, y: e.offsetY };
        };

        canvas.onmousemove = e => {
            if (!cropMode || !cropStart) return;
            cropEnd = { x: e.offsetX, y: e.offsetY };
            drawImage();
        };

        canvas.onmouseup = e => {
            if (!cropMode) return;
            cropEnd = { x: e.offsetX, y: e.offsetY };
            drawImage();
        };

        document.getElementById("processImageBtn").onclick = () => {
            if (!loadedImage) return;

            let tempCanvas = document.createElement("canvas");
            let tctx = tempCanvas.getContext("2d");

            if (cropMode && cropStart && cropEnd) {
                const x = cropStart.x;
                const y = cropStart.y;
                const w = cropEnd.x - cropStart.x;
                const h = cropEnd.y - cropStart.y;

                tempCanvas.width = w;
                tempCanvas.height = h;
                tctx.drawImage(canvas, x, y, w, h, 0, 0, w, h);
            } else {
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                tctx.drawImage(canvas, 0, 0);
            }

            const dataUrl = tempCanvas.toDataURL();
            runOcrWithHighlight(dataUrl);
        };

        function runOcrWithHighlight(imageDataUrl) {
            statusEl.textContent = "Running OCR...";

            Tesseract.recognize(imageDataUrl, "eng", {
                logger: m => {
                    if (m.status === "recognizing text") {
                        statusEl.textContent = `OCR: ${Math.round(m.progress * 100)}%`;
                    }
                }
            })
                .then(result => {
                    statusEl.textContent = "OCR complete.";

                    const words = result.data.words;

                    let cleanedLines = words
                        .map(w => w.text.toUpperCase().replace(/[^A-Z0-9*]/g, ""))
                        .filter(t => t.length >= 5);

                    drawImage();

                    ctx.strokeStyle = "yellow";
                    ctx.lineWidth = 2;

                    words.forEach(w => {
                        const clean = w.text.toUpperCase().replace(/[^A-Z0-9*]/g, "");
                        if (clean.length >= 5) {
                            const b = w.bbox;
                            ctx.strokeRect(b.x0, b.y0, b.x1 - b.x0, b.y1 - b.y0);
                        }
                    });

                    const listContainer = document.getElementById("ocrList");
                    listContainer.innerHTML = "";

                    if (cleanedLines.length === 0) {
                        listContainer.innerHTML = "<div>No usable text found.</div>";
                        return;
                    }

                    cleanedLines.forEach(line => {
                        const btn = document.createElement("button");
                        btn.textContent = line;
                        btn.className = "btn-secondary";
                        btn.onclick = () => vinInput.value = line;
                        listContainer.appendChild(btn);
                    });
                });
        }

        document.getElementById("decodeBtn").onclick = () => {
            const text = vinInput.value.toUpperCase().replace(/\s+/g, "");
            decodeResult.style.display = "block";

            const harley1981Regex = /^[A-HJ-NPR-Z0-9]{17}$/;

            if (harley1981Regex.test(text)) {
                decodeResult.textContent = "Matched Harley-Davidson 1981–Present 17-digit VIN format.";
            } else {
                decodeResult.textContent = "VIN does not match Harley 1981–Present format.";
            }
        };
    </script>

</body>

</html>
