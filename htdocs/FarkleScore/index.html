<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farkle Scoreboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="game">
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <a href="../" class="back-link">← Back to Apps</a>
          <p class="eyebrow">Wooden table edition</p>
          <h1>Farkle</h1>
        </div>
        <nav class="topnav">
          <a href="index.html" class="active">Game</a>
          <a href="players.html">Players</a>
          <a href="settings.html">Settings</a>
          <a href="standings.html">Standings</a>
        </nav>
      </header>

      <main class="game-layout">

        <!-- Player info -->
        <section class="card player-card">
          <div class="card-heading">
            <h2>Current player</h2>
            <span id="gameStatus" class="status-pill">Ready</span>
          </div>
          <div id="currentPlayerInfo" class="player-hero"></div>
          <div class="score-grid">
            <div class="score-cell">
              <p class="score-label">Total score</p>
              <p id="playerScore" class="score-value">0</p>
            </div>
            <div class="score-cell">
              <p class="score-label">Place</p>
              <p id="playerPlace" class="score-value">--</p>
            </div>
            <div class="score-cell highlight">
              <p class="score-label">Turn score</p>
              <p id="turnScore" class="score-value">0</p>
            </div>
          </div>
          <p id="openingMessage" class="opening-message hidden"></p>
          <p id="lastRoundMessage" class="opening-message hidden"></p>
        </section>

        <!-- Field -->
        <section class="card field-card">
          <div class="card-heading">
            <h2>Field</h2>
            <p class="subtle" id="fieldHint">Tap a die below to add it to the field.</p>
          </div>
          <div id="fieldArea" class="field-area"></div>
        </section>

        <!-- Dice input + controls -->
        <section class="card controls-card">
          <div class="card-heading">
            <h2>Dice</h2>
            <p class="subtle">Tap to add to the current roll.</p>
          </div>
          <div class="dice-input-area">
            <button class="die-input-btn" data-value="1" aria-label="Add a 1">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="20" cy="20" r="5"/></svg>
            </button>
            <button class="die-input-btn" data-value="2" aria-label="Add a 2">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="11" cy="11" r="4"/><circle cx="29" cy="29" r="4"/></svg>
            </button>
            <button class="die-input-btn" data-value="3" aria-label="Add a 3">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="11" cy="11" r="4"/><circle cx="20" cy="20" r="4"/><circle cx="29" cy="29" r="4"/></svg>
            </button>
            <button class="die-input-btn" data-value="4" aria-label="Add a 4">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="11" cy="11" r="4"/><circle cx="29" cy="11" r="4"/><circle cx="11" cy="29" r="4"/><circle cx="29" cy="29" r="4"/></svg>
            </button>
            <button class="die-input-btn" data-value="5" aria-label="Add a 5">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="11" cy="11" r="4"/><circle cx="29" cy="11" r="4"/><circle cx="20" cy="20" r="4"/><circle cx="11" cy="29" r="4"/><circle cx="29" cy="29" r="4"/></svg>
            </button>
            <button class="die-input-btn" data-value="6" aria-label="Add a 6">
              <svg viewBox="0 0 40 40" class="pip-svg"><circle cx="11" cy="10" r="4"/><circle cx="29" cy="10" r="4"/><circle cx="11" cy="20" r="4"/><circle cx="29" cy="20" r="4"/><circle cx="11" cy="30" r="4"/><circle cx="29" cy="30" r="4"/></svg>
            </button>
          </div>

          <div id="rollValidation" class="roll-validation hidden"></div>

          <div class="button-row">
            <button id="rollButton" class="btn btn-primary">Roll</button>
            <button id="bankButton" class="btn btn-success">Bank</button>
            <button id="farkleButton" class="btn btn-danger">Farkle</button>
          </div>
        </section>

      </main>
    </div>

    <div id="summaryOverlay" class="overlay hidden"></div>
    <div id="lastRoundBanner" class="last-round-banner hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
