<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farkle – Players</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="players">
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <p class="eyebrow">Wooden table edition</p>
          <h1>Farkle</h1>
        </div>
        <nav class="topnav">
          <a href="index.html">Game</a>
          <a href="players.html" class="active">Players</a>
          <a href="settings.html">Settings</a>
          <a href="standings.html">Standings</a>
        </nav>
      </header>

      <main class="page-content">
        <section class="card">
          <div class="card-heading">
            <h2>Player setup</h2>
            <div class="button-row compact">
              <button id="addPlayerButton" class="btn btn-primary">+ Add player</button>
              <button id="startNewGameButton" class="btn btn-success">Start new game</button>
            </div>
          </div>
          <p class="subtle" style="margin-bottom:16px">Names can be edited inline. Reorder with arrows. Removing a player mid-game will reset their score.</p>
          <div id="playersList" class="players-list"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
