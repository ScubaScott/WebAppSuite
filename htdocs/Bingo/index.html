<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Number Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="tracking.js" defer></script>
</head>

<body>

    <header class="topbar">
        <div class="topbar-brand">
            <a href="../index.html" class="back-link">← Back to Apps</a>
            <h1>Bingo Number Tracker</h1>
        </div>
        <button id="newSessionBtn" class="btn primary-btn">New Session</button>
    </header>

    <main class="page-content">
        <section class="stats-card">
            <div class="last-five-card">
                <div class="stat-header">
                    <span class="stat-label">Last 6</span>
                    <button id="callLogLink" class="link-button" type="button">Call log</button>
                </div>
                <div id="lastFiveList" class="last-five-list" aria-live="polite"></div>
                <span class="total-count" id="totalCalled">0 called</span>
            </div>
        </section>

        <!-- Input mode toggle -->
        <div class="input-mode-toggle-wrap">
            <div class="input-mode-toggle" role="group" aria-label="Input mode">
                <button id="toggleByLetter" class="toggle-btn active" data-mode="letter">By Letter</button>
                <button id="toggleByNumber" class="toggle-btn" data-mode="number">By Number</button>
            </div>
        </div>

        <!-- Session word bar (game name) -->
        <section id="sessionWordBar" class="session-word-bar" aria-label="Bingo columns"></section>

        <!-- BY LETTER input panel -->
        <section id="byLetterPanel" class="by-letter-panel" aria-label="By letter input">
            <div id="numberPicker" class="number-picker hidden" aria-live="polite">
                <!-- 3 rows × 5 numbers, populated by JS -->
            </div>
        </section>

        <!-- BY NUMBER tracking grid (existing) -->
        <section id="trackingGrid" class="tracking-grid hidden" aria-label="Bingo numbers"></section>

        <!-- Game Selection -->
        <section id="gameSection" class="game-section">
            <div class="game-section-header">
                <div class="game-menu-wrap">
                    <button id="gameMenuBtn" class="card-menu-btn" aria-label="Game menu" aria-expanded="false">
                        <span></span><span></span><span></span>
                    </button>
                    <div id="gameMenuDropdown" class="card-menu-dropdown hidden"></div>
                </div>
                <div class="game-info">
                    <span class="stat-label">Game Mode</span>
                    <span id="selectedGameName" class="selected-game-name">— None selected —</span>
                </div>
            </div>
        </section>

        <!-- Bingo Cards -->
        <section id="bingoCardsSection" class="bingo-cards-section" aria-label="Bingo cards">
            <div class="bingo-cards-header">
                <span class="stat-label">Bingo Cards</span>
                <button id="addCardBtn" class="link-button" type="button">+ Add Card</button>
            </div>
            <div id="bingoCardsList" class="bingo-cards-list">
                <!-- Cards will be rendered here -->
                <p class="bingo-cards-placeholder">No bingo cards added yet.</p>
            </div>
        </section>
    </main>

</body>
</html>
