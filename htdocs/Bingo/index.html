<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bingo Number Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="tracking.js" defer></script>
</head>

<body>

    <header>
        <h2>Bingo Number Tracker</h2>
        <button id="newSessionBtn">New Session</button>
    </header>

    <div id="topBar">
        <span id="lastBall">Last: --</span>
        <span id="totalCalled">Total: 0</span>
    </div>

    <div id="letterBar"></div>

    <button id="toggleCalled">Show Called Numbers</button>

    <div id="calledPanel" class="hidden"></div>

    <div id="trackingGrid"></div>

</body>
</html>
