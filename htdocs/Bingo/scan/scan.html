<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scan Bingo Card</title>
    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script src="utils.js"></script>
    <script src="ocr.js"></script>
</head>

<body>
    <h2>Scan Bingo Card</h2>

    <video id="camera" autoplay playsinline></video>
    <button id="captureBtn">Capture</button>

    <canvas id="previewCanvas"></canvas>

    <button id="ocrBtn">Run OCR</button>

    <div id="result"></div>

<script>
const video = document.getElementById("camera");
const captureBtn = document.getElementById("captureBtn");
const previewCanvas = document.getElementById("previewCanvas");
const ocrBtn = document.getElementById("ocrBtn");
const resultDiv = document.getElementById("result");

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => video.srcObject = stream);

captureBtn.onclick = () => {
    const ctx = previewCanvas.getContext("2d");
    previewCanvas.width = video.videoWidth;
    previewCanvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    autoCrop(previewCanvas).then(croppedCanvas => {
        previewCanvas.width = croppedCanvas.width;
        previewCanvas.height = croppedCanvas.height;
        previewCanvas.getContext("2d").drawImage(croppedCanvas, 0, 0);
        ocrBtn.style.display = "block";
    });
};

ocrBtn.onclick = async () => {
    resultDiv.innerHTML = "Running OCR...";

    const grid = await runOCR(previewCanvas);

    resultDiv.innerHTML = "<pre>" + JSON.stringify(grid, null, 2) + "</pre>";
};
</script>

</body>
</html>
