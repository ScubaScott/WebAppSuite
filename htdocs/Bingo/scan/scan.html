<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scan Bingo Card</title>
    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script src="utils.js"></script>
    <script src="ocr.js"></script>
</head>

<body>
    <!-- Main heading shown to the user at the top of the page. -->
    <h2>Scan Bingo Card</h2>

    <!-- This video element shows the live camera feed from the device camera. -->
    <video id="camera" autoplay playsinline></video>

    <!-- Capture button grabs the current frame from the camera and draws it into the preview canvas. -->
    <button id="captureBtn">Capture</button>

    <!-- The preview canvas is where the captured image is displayed after cropping and preprocessing. -->
    <canvas id="previewCanvas"></canvas>

    <!-- This button runs the OCR process against the currently displayed card image. -->
    <button id="ocrBtn">Run OCR</button>

    <h3>OCR Tuning</h3>

    <!-- These controls let the user adjust the image-preprocessing and Tesseract settings. -->
    <div id="tuning">
        <label>Threshold Mode:</label>
        <select id="threshMode">
            <option value="otsu">OTSU</option>
            <option value="binary">Binary</option>
            <option value="adaptive">Adaptive</option>
        </select>

        <label>Blur:</label>
        <select id="blurMode">
            <option value="none">None</option>
            <option value="gaussian">Gaussian</option>
            <option value="median">Median</option>
        </select>

        <label>Zoom Factor:</label>
        <input id="zoomFactor" type="number" value="2" min="1" max="5">

        <label>OCR Engine Mode:</label>
        <select id="ocrEngineMode">
            <option value="default">Default</option>
            <option value="legacy">Legacy</option>
            <option value="lstm">LSTM</option>
        </select>

        <label>Page Segmentation:</label>
        <select id="pageSegMode">
            <option value="auto">Auto</option>
            <option value="single_block">Single Block</option>
            <option value="single_line">Single Line</option>
            <option value="single_word">Single Word</option>
            <option value="single_char">Single Char</option>
        </select>

        <label>Invert Colors:</label>
        <input id="invertColors" type="checkbox">

        <label>Morphology:</label>
        <select id="morphMode">
            <option value="none">None</option>
            <option value="dilate">Dilate</option>
            <option value="erode">Erode</option>
            <option value="open">Open</option>
            <option value="close">Close</option>
        </select>

        <label>Binary Threshold:</label>
        <input id="binaryThreshold" type="number" value="127" min="0" max="255">

        <label>Adaptive Block Size:</label>
        <input id="adaptiveBlockSize" type="number" value="11" min="3" max="31" step="2">

        <label>Adaptive C:</label>
        <input id="adaptiveC" type="number" value="2" min="0" max="20">

        <label>Row Shift:</label>
        <input id="rowOffset" type="number" value="0" min="-2" max="2">

        <label>Column Shift:</label>
        <input id="colOffset" type="number" value="0" min="-2" max="2">
    </div>
    <div id="status"></div>
    <h3>OCR Result</h3>
    <div id="bingoOutput"></div>

<script>
// Get references to the main page elements so the script can interact with them.
const video = document.getElementById("camera");
const captureBtn = document.getElementById("captureBtn");
const previewCanvas = document.getElementById("previewCanvas");
const ocrBtn = document.getElementById("ocrBtn");
const StatusDiv = document.getElementById("status");

// Ask the browser for access to the rear camera when it is available.
// If access fails, the page should remain usable and simply skip the camera preview.
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => video.srcObject = stream)
    .catch(() => {});

// When the user presses Capture, copy the current camera frame into the preview canvas.
// The image is then passed through the auto-crop logic so only the card area remains visible.
captureBtn.onclick = () => {
    const ctx = previewCanvas.getContext("2d");
    previewCanvas.width = video.videoWidth;
    previewCanvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    autoCrop(previewCanvas).then(croppedCanvas => {
        previewCanvas.width = croppedCanvas.width;
        previewCanvas.height = croppedCanvas.height;
        previewCanvas.getContext("2d").drawImage(croppedCanvas, 0, 0);
    }).catch(() => {});
};

// Run OCR against the current preview image and draw the results into the output area.
async function doOCR() {
    StatusDiv.innerHTML = "Running OCR...";

    try {
        const grid = await runOCR(previewCanvas);
        drawBingoGrid(grid);
        StatusDiv.innerHTML = "Done.";
    } catch (err) {
        // Surface the failure in the console and show a simple status message.
        console.error(err);
        StatusDiv.innerHTML = "OCR failed.";
    }
}

// Hook the OCR button to our function so the user can run recognition at any time.
ocrBtn.onclick = doOCR;
</script>

</body>
</html>
