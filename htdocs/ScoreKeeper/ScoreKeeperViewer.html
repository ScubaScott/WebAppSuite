<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ScoreKeeper — Viewer</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #29395f 0%, #090d18 40%, #02040b 100%);
            color: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px;
        }
        .scoreboard {
            width: min(100%, 980px);
            background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.98));
            border: 2px solid rgba(96,165,250,0.3);
            border-radius: 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.45);
            overflow: hidden;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 24px 10px;
            gap: 16px;
        }
        .header-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .title {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .meta {
            margin: 0;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .back-link {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 700;
        }
        .court {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 18px 24px;
        }
        .team-panel {
            flex: 1;
            text-align: center;
            padding: 18px 16px;
            border-radius: 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.12);
        }
        .team-name {
            font-size: 1rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #a5b4fc;
            margin-bottom: 12px;
        }
        .team-score {
            font-size: clamp(4.5rem, 7vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            margin: 0;
            color: #f8fafc;
        }
        .center-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 14px;
            border-radius: 26px;
            background: radial-gradient(circle at top, rgba(59,130,246,0.18), rgba(15,23,42,0.92));
            border: 1px solid rgba(59,130,246,0.35);
        }
        .clock {
            font-family: 'Digital-7', monospace;
            font-size: 4.2rem;
            letter-spacing: 0.05em;
            color: #f8fafc;
            text-shadow: 0 0 30px rgba(59,130,246,0.45);
        }
        .period {
            font-size: 1.05rem;
            color: #c7d2fe;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .history-section {
            margin: 0 24px 24px;
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(148,163,184,0.14);
            border-radius: 26px;
            overflow: hidden;
        }
        .history-title {
            margin: 0;
            padding: 18px 20px;
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(148,163,184,0.1);
            background: rgba(15,23,42,0.9);
        }
        .history-list {
            max-height: 420px;
            overflow-y: auto;
        }
        .history-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: start;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .history-item:last-child { border-bottom: none; }
        .entry-label {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .entry-label strong {
            color: #f8fafc;
            font-size: 0.98rem;
        }
        .entry-label span {
            color: #94a3b8;
            font-size: 0.88rem;
        }
        .entry-time {
            color: #94a3b8;
            font-size: 0.82rem;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="scoreboard">
    <div class="header-row">
        <div class="header-info">
            <h1 class="title" id="title">Game Viewer</h1>
            <p class="meta" id="meta">Loading…</p>
        </div>
        <a class="back-link" href="ScoreKeeperActiveGames.html">← Active Games</a>
    </div>
    <div class="court">
        <div class="team-panel">
            <div class="team-name" id="homeName">Home</div>
            <p class="team-score" id="homeScore">0</p>
        </div>
        <div class="center-panel">
            <div class="clock" id="timer">00:00.0</div>
            <div class="period" id="period">P1</div>
        </div>
        <div class="team-panel">
            <div class="team-name" id="awayName">Away</div>
            <p class="team-score" id="awayScore">0</p>
        </div>
    </div>
    <section class="history-section">
        <div class="history-title">Activity Log</div>
        <div class="history-list" id="historyList"></div>
    </section>
</div>

<script>
    const SERVER = './active-games.php';
    function qs(name) { return new URLSearchParams(location.search).get(name); }
    const gameId = qs('id');

    const homeNameEl = document.getElementById('homeName');
    const awayNameEl = document.getElementById('awayName');
    const homeScoreEl = document.getElementById('homeScore');
    const awayScoreEl = document.getElementById('awayScore');
    const timerEl = document.getElementById('timer');
    const periodEl = document.getElementById('period');
    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');
    const historyList = document.getElementById('historyList');

    let current = null;
    let tickInterval = null;

    function formatTimeMs(ms) {
        const totalSeconds = Math.floor(Math.abs(ms) / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const tenths = Math.floor((Math.abs(ms) % 1000) / 100);
        return `${minutes}:${String(seconds).padStart(2,'0')}.${tenths}`;
    }

    function formatAge(ts) {
        if (!ts) return 'unknown';
        const diff = Date.now() - ts;
        const seconds = Math.round(diff / 1000);
        if (seconds < 10) return 'just now';
        if (seconds < 60) return `${seconds}s ago`;
        const minutes = Math.round(seconds / 60);
        return `${minutes}m ago`;
    }

    function render() {
        if (!current) return;
        homeNameEl.textContent = current.homeTeamName || 'Home';
        awayNameEl.textContent = current.awayTeamName || 'Away';
        homeScoreEl.textContent = current.homeScore || 0;
        awayScoreEl.textContent = current.awayScore || 0;
        periodEl.textContent = `P${current.currentPeriod || 1}`;
        titleEl.textContent = current.gameTitle || `${homeNameEl.textContent} vs ${awayNameEl.textContent}`;
        metaEl.textContent = `Last update: ${formatAge(current.lastUpdate)}`;

        historyList.innerHTML = '';
        const hist = Array.isArray(current.scoreHistory) ? current.scoreHistory.slice().reverse() : [];
        hist.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'history-item';

            const entryLabel = document.createElement('div');
            entryLabel.className = 'entry-label';
            const entryTitle = document.createElement('strong');
            const entrySub = document.createElement('span');

            if (entry.type === 'event') {
                entryTitle.textContent = entry.text || '';
                entrySub.textContent = entry.timestamp || entry.time || '';
            } else {
                const teamName = entry.teamName || (entry.teamId === 'home' ? 'Home' : 'Away');
                entryTitle.textContent = `${teamName} scored`;
                entrySub.textContent = `${entry.currentScore || ''} • ${entry.gameTime || entry.timestamp || ''}`;
            }

            entryLabel.appendChild(entryTitle);
            if (entrySub.textContent) entryLabel.appendChild(entrySub);

            const timeEl = document.createElement('div');
            timeEl.className = 'entry-time';
            timeEl.textContent = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';

            item.appendChild(entryLabel);
            if (timeEl.textContent) item.appendChild(timeEl);
            historyList.appendChild(item);
        });
    }

    function startTicker() {
        if (tickInterval) clearInterval(tickInterval);
        tickInterval = setInterval(() => {
            if (!current) return;
            const now = Date.now();
            let displayMs = Number(current.elapsedMs) || 0;
            if (current.timerRunning && Number(current.lastUpdate)) {
                displayMs += now - Number(current.lastUpdate);
            }
            timerEl.textContent = formatTimeMs(displayMs);
        }, 100);
    }

    async function loadGame() {
        if (!gameId) {
            document.body.innerHTML = '<div style="padding:20px; color:#fff;">Missing game id</div>';
            return;
        }
        try {
            const resp = await fetch(`${SERVER}?id=${encodeURIComponent(gameId)}`);
            if (!resp.ok) throw new Error('server');
            const payload = await resp.json();
            current = payload.game || null;
            if (!current) {
                document.body.innerHTML = '<div style="padding:20px; color:#fff;">Game not found or expired.</div>';
                return;
            }
            current.homeScore = Number(current.homeScore) || 0;
            current.awayScore = Number(current.awayScore) || 0;
            current.elapsedMs = Number(current.elapsedMs) || 0;
            current.lastUpdate = Number(current.lastUpdate) || Date.now();
            render();
            startTicker();
        } catch (e) {
            document.body.innerHTML = '<div style="padding:20px; color:#fff;">Unable to fetch game.</div>';
        }
    }

    setInterval(loadGame, 4000);
    loadGame();
</script>
</body>
</html>

                div.innerHTML = `<div>${entry.text || ''}</div><div class="meta">${entry.timestamp || entry.time || ''}</div>`;

                const timeLabel = entry.timestamp || entry.time || '';
                div.innerHTML = `<div><strong>${entry.teamName || (entry.teamId==='home' ? 'Home' : 'Away')}</strong> — ${entry.currentScore || ''}</div><div class="meta">${timeLabel}</div>`;
